<!DOCTYPE html>
<html>
<head>
    <title>KJs TRD Chart</title>
    <script src="https://unpkg.com/lightweight-charts@4.0.0/dist/lightweight-charts.standalone.js">
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0b0e14;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
        }
        #chart-container {
            width: 95%;
            height: 90vh;
            background: #0f1620;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #2a3a4e;
        }
        #chart {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div id="chart-container">
        <div id="chart"></div>
    </div>

    <script>
        console.log('🚀 Starting chart...');

        const chartElement = document.getElementById('chart');
        console.log('📦 Chart element:', chartElement);

        const chart = LightweightCharts.createChart(chartElement, {
            width: chartElement.clientWidth,
            height: chartElement.clientHeight,
            layout: {
                background: { color: '#0f1620' },
                textColor: '#8a9bb5',
            },
            grid: {
                vertLines: { color: '#1a2433' },
                horzLines: { color: '#1a2433' },
            },
        });

        console.log('✅ Chart created!');

        const candleSeries = chart.addCandlestickSeries({
            upColor: '#22c55e',
            downColor: '#ef4444',
            borderUpColor: '#22c55e',
            borderDownColor: '#ef4444',
            wickUpColor: '#22c55e',
            wickDownColor: '#ef4444',
        });

        console.log('✅ Series added!');

        // Generate mock data
        const data = [];
        let price = 100;
        for (let i = 0; i < 100; i++) {
            const change = (Math.random() - 0.48) * 3;
            const open = price;
            const close = price + change;
            const high = Math.max(open, close) + Math.random() * 1.5;
            const low = Math.min(open, close) - Math.random() * 1.5;
            data.push({
                time: i + 1,
                open: Math.round(open * 100) / 100,
                high: Math.round(high * 100) / 100,
                low: Math.round(low * 100) / 100,
                close: Math.round(close * 100) / 100,
            });
            price = close;
        }

        candleSeries.setData(data);
        console.log('✅ Data set! Chart should be visible now!');
        console.log('📊 Total candles:', data.length);
    </script>
</body>
</html>
