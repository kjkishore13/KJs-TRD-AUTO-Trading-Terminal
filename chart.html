<!DOCTYPE html>
<html>
<head>
    <title>KJs TRD - Chart</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0b0e14;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
        }
        #chart-container {
            background: #0f1620;
            border-radius: 12px;
            padding: 30px;
            width: 95%;
            max-width: 1100px;
            border: 1px solid #2a3a4e;
            height: 600px;
        }
        #chart {
            width: 100%;
            height: 100%;
            position: relative;
        }
        canvas {
            width: 100% !important;
            height: 100% !important;
        }
        .back-btn {
            display: inline-block;
            color: #3b82f6;
            text-decoration: none;
            margin-bottom: 15px;
            font-size: 14px;
        }
        .back-btn:hover {
            text-decoration: underline;
        }
        .loading {
            color: #8a9bb5;
            text-align: center;
            padding: 50px;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <div id="chart-container">
        <a href="index.html" class="back-btn">← Back to Terminal</a>
        <div id="chart">
            <div class="loading">📊 Loading chart...</div>
        </div>
    </div>

    <script>
        console.log('🚀 Starting Dhan-powered chart...');

        // =============================================
        // 1. GENERATE CANDLESTICK DATA (Mock for now)
        // =============================================
        function generateCandleData(count = 100) {
            const data = [];
            let price = 22400;
            const now = new Date();
            const oneHour = 60 * 60 * 1000;

            for (let i = count - 1; i >= 0; i--) {
                const change = (Math.random() - 0.48) * 60;
                const open = price;
                const close = price + change;
                const high = Math.max(open, close) + Math.random() * 20;
                const low = Math.min(open, close) - Math.random() * 20;

                data.push({
                    time: new Date(now.getTime() - i * oneHour),
                    open: Math.round(open * 100) / 100,
                    high: Math.round(high * 100) / 100,
                    low: Math.round(low * 100) / 100,
                    close: Math.round(close * 100) / 100,
                });

                price = close;
            }

            return data;
        }

        // =============================================
        // 2. DRAW CANDLESTICKS ON CANVAS
        // =============================================
        function drawCandlesticks(canvas, data) {
            const ctx = canvas.getContext('2d');
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;

            const w = canvas.width;
            const h = canvas.height;
            const padding = 40;

            // Clear
            ctx.fillStyle = '#0f1620';
            ctx.fillRect(0, 0, w, h);

            // Find min/max
            let minPrice = Infinity;
            let maxPrice = -Infinity;
            data.forEach(d => {
                if (d.high > maxPrice) maxPrice = d.high;
                if (d.low < minPrice) minPrice = d.low;
            });
            const range = maxPrice - minPrice || 1;

            // Draw grid
            ctx.strokeStyle = '#1a2433';
            ctx.lineWidth = 0.5;
            for (let i = 0; i < 5; i++) {
                const y = padding + (h - padding * 2) * (i / 4);
                ctx.beginPath();
                ctx.moveTo(padding, y);
                ctx.lineTo(w - padding, y);
                ctx.stroke();
                const label = (maxPrice - (range * i / 4)).toFixed(0);
                ctx.fillStyle = '#5a6f8a';
                ctx.font = '10px Arial';
                ctx.fillText(label, 4, y + 3);
            }

            // Calculate candle sizes
            const candleWidth = (w - padding * 2) / data.length * 0.7;
            const gap = (w - padding * 2) / data.length * 0.3;

            // Draw each candle
            data.forEach((d, i) => {
                const x = padding + i * (candleWidth + gap);
                const yHigh = padding + (h - padding * 2) * (1 - (d.high - minPrice) / range);
                const yLow = padding + (h - padding * 2) * (1 - (d.low - minPrice) / range);
                const yOpen = padding + (h - padding * 2) * (1 - (d.open - minPrice) / range);
                const yClose = padding + (h - padding * 2) * (1 - (d.close - minPrice) / range);

                const isBull = d.close > d.open;
                const color = isBull ? '#22c55e' : '#ef4444';

                // Draw wick
                ctx.strokeStyle = color;
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(x + candleWidth / 2, yHigh);
                ctx.lineTo(x + candleWidth / 2, yLow);
                ctx.stroke();

                // Draw body
                const bodyTop = Math.min(yOpen, yClose);
                const bodyHeight = Math.max(Math.abs(yClose - yOpen), 2);
                ctx.fillStyle = color;
                ctx.fillRect(x, bodyTop, candleWidth, bodyHeight);

                // Draw body border
                ctx.strokeStyle = color;
                ctx.lineWidth = 0.5;
                ctx.strokeRect(x, bodyTop, candleWidth, bodyHeight);
            });

            // Draw EMA line (simple average)
            ctx.strokeStyle = '#3b82f6';
            ctx.lineWidth = 2;
            ctx.beginPath();
            let first = true;
            for (let i = 20; i < data.length; i++) {
                let sum = 0;
                for (let j = i - 20; j <= i; j++) {
                    sum += data[j].close;
                }
                const ma = sum / 20;
                const x = padding + i * (candleWidth + gap) + candleWidth / 2;
                const y = padding + (h - padding * 2) * (1 - (ma - minPrice) / range);
                if (first) {
                    ctx.moveTo(x, y);
                    first = false;
                } else {
                    ctx.lineTo(x, y);
                }
            }
            ctx.stroke();

            // Draw Buy/Sell markers
            const markerIndices = [12, 28, 45, 62, 78];
            markerIndices.forEach(idx => {
                if (idx < data.length) {
                    const d = data[idx];
                    const x = padding + idx * (candleWidth + gap) + candleWidth / 2;
                    const y = padding + (h - padding * 2) * (1 - (d.close - minPrice) / range);
                    const isBuy = idx % 2 === 0;

                    ctx.fillStyle = isBuy ? '#22c55e' : '#ef4444';
                    ctx.beginPath();
                    ctx.moveTo(x, isBuy ? y - 14 : y + 14);
                    ctx.lineTo(x - 7, isBuy ? y - 4 : y + 4);
                    ctx.lineTo(x + 7, isBuy ? y - 4 : y + 4);
                    ctx.closePath();
                    ctx.fill();

                    ctx.fillStyle = '#e8edf5';
                    ctx.font = '8px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText(isBuy ? 'BUY' : 'SELL', x, isBuy ? y - 18 : y + 26);
                }
            });

            // Update price display
            if (data.length > 0) {
                const last = data[data.length - 1];
                const first = data[0];
                const change = last.close - first.open;
                const changePercent = (change / first.open) * 100;
                document.title = `KJs TRD - ${last.close.toFixed(2)}`;
            }

            console.log('✅ Chart drawn successfully!');
            console.log('📊 Total candles:', data.length);
        }

        // =============================================
        // 3. INITIALIZE THE CHART
        // =============================================
        function initChart() {
            const container = document.getElementById('chart');
            const canvas = document.createElement('canvas');
            canvas.id = 'chartCanvas';
            container.innerHTML = '';
            container.appendChild(canvas);

            const data = generateCandleData(100);
            drawCandlesticks(canvas, data);

            // Redraw on resize
            let resizeTimeout;
            window.addEventListener('resize', function() {
                clearTimeout(resizeTimeout);
                resizeTimeout = setTimeout(function() {
                    drawCandlesticks(canvas, data);
                }, 300);
            });

            console.log('✅ Chart initialized successfully!');
        }

        // =============================================
        // 4. START
        // =============================================
        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(initChart, 500);
        });

        console.log('🚀 KJs TRD Chart is ready!');
    </script>

</body>
</html>
