<!DOCTYPE html>
<html>
<head>
    <title>KJs TRD - Candlestick Chart</title>
    <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.0.0/dist/lightweight-charts.standalone.js">
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0b0e14;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
        }
        #chart-container {
            background: #0f1620;
            border-radius: 12px;
            padding: 30px;
            width: 95%;
            max-width: 1100px;
            border: 1px solid #2a3a4e;
            height: 600px;
        }
        #chart {
            width: 100%;
            height: 100%;
        }
        .back-btn {
            display: inline-block;
            color: #3b82f6;
            text-decoration: none;
            margin-bottom: 15px;
            font-size: 14px;
        }
        .back-btn:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div id="chart-container">
        <a href="index.html" class="back-btn">← Back to Terminal</a>
        <div id="chart"></div>
    </div>

    <script>
        console.log('🚀 Starting Lightweight Charts...');

        // =============================================
        // 1. GENERATE CANDLESTICK DATA
        // =============================================
        function generateCandleData(count = 100) {
            const data = [];
            let price = 22400;
            const now = new Date();
            const oneHour = 60 * 60 * 1000;

            for (let i = count - 1; i >= 0; i--) {
                const change = (Math.random() - 0.48) * 60;
                const open = price;
                const close = price + change;
                const high = Math.max(open, close) + Math.random() * 20;
                const low = Math.min(open, close) - Math.random() * 20;

                data.push({
                    time: new Date(now.getTime() - i * oneHour).getTime() / 1000,
                    open: Math.round(open * 100) / 100,
                    high: Math.round(high * 100) / 100,
                    low: Math.round(low * 100) / 100,
                    close: Math.round(close * 100) / 100,
                });

                price = close;
            }

            return data;
        }

        // =============================================
        // 2. CREATE THE CHART
        // =============================================
        const chartElement = document.getElementById('chart');

        const chart = LightweightCharts.createChart(chartElement, {
            width: chartElement.clientWidth,
            height: chartElement.clientHeight,
            layout: {
                background: { color: '#0f1620' },
                textColor: '#8a9bb5',
            },
            grid: {
                vertLines: { color: '#1a2433' },
                horzLines: { color: '#1a2433' },
            },
            crosshair: {
                mode: LightweightCharts.CrosshairMode.Normal,
            },
            rightPriceScale: {
                borderColor: '#2a3a4e',
            },
            timeScale: {
                borderColor: '#2a3a4e',
                timeVisible: true,
                secondsVisible: false,
            },
        });

        console.log('✅ Chart created!');

        // =============================================
        // 3. ADD CANDLESTICK SERIES
        // =============================================
        const candleSeries = chart.addCandlestickSeries({
            upColor: '#22c55e',
            downColor: '#ef4444',
            borderUpColor: '#22c55e',
            borderDownColor: '#ef4444',
            wickUpColor: '#22c55e',
            wickDownColor: '#ef4444',
        });

        console.log('✅ Series added!');

        // =============================================
        // 4. LOAD THE DATA
        // =============================================
        const data = generateCandleData(100);
        candleSeries.setData(data);

        console.log('✅ Data loaded!');
        console.log('📊 Total candles:', data.length);

        // =============================================
        // 5. ADD EMA INDICATOR
        // =============================================
        function calculateEMA(data, period = 20) {
            const ema = [];
            const multiplier = 2 / (period + 1);

            for (let i = 0; i < data.length; i++) {
                if (i < period - 1) {
                    ema.push(null);
                    continue;
                }

                if (i === period - 1) {
                    let sum = 0;
                    for (let j = 0; j < period; j++) {
                        sum += data[j].close;
                    }
                    ema.push(sum / period);
                } else {
                    ema.push((data[i].close - ema[i - 1]) * multiplier + ema[i - 1]);
                }
            }
            return ema;
        }

        const emaValues = calculateEMA(data, 20);
        const emaData = data.map((d, i) => ({
            time: d.time,
            value: emaValues[i],
        })).filter(d => d.value !== null);

        const emaSeries = chart.addLineSeries({
            color: '#3b82f6',
            lineWidth: 2,
            priceLineVisible: false,
            lastValueVisible: false,
            crosshairMarkerVisible: false,
        });

        emaSeries.setData(emaData);
        console.log('✅ EMA 20 added!');

        // =============================================
        // 6. ADD BUY/SELL MARKERS
        // =============================================
        const markers = [];
        for (let i = 20; i < data.length - 10; i += 25 + Math.floor(Math.random() * 15)) {
            const isBuy = Math.random() > 0.5;
            markers.push({
                time: data[i].time,
                position: isBuy ? 'belowBar' : 'aboveBar',
                color: isBuy ? '#22c55e' : '#ef4444',
                shape: isBuy ? 'arrowUp' : 'arrowDown',
                text: isBuy ? 'BUY' : 'SELL',
                size: 1,
            });
        }
        candleSeries.setMarkers(markers);
        console.log('✅ Buy/Sell markers added!');

        // =============================================
        // 7. RESIZE HANDLER
        // =============================================
        function handleResize() {
            const container = document.getElementById('chart-container');
            const rect = container.getBoundingClientRect();
            chart.applyOptions({
                width: rect.width - 60,
                height: rect.height - 80,
            });
        }

        let resizeTimeout;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(handleResize, 200);
        });

        console.log('🎉 Chart is fully loaded!');
    </script>

</body>
</html>
