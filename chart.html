<!DOCTYPE html>
<html>
<head>
    <title>KJs TRD - Chart</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js">
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0b0e14;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
        }
        #chart-container {
            background: #0f1620;
            border-radius: 12px;
            padding: 30px;
            width: 95%;
            max-width: 1100px;
            border: 1px solid #2a3a4e;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.5);
        }
        h2 {
            color: #e8edf5;
            text-align: center;
            margin-bottom: 20px;
            font-weight: 400;
            letter-spacing: 1px;
        }
        .chart-wrapper {
            position: relative;
            height: 500px;
            width: 100%;
        }
        canvas {
            width: 100% !important;
            height: 100% !important;
        }
        .back-btn {
            display: inline-block;
            color: #3b82f6;
            text-decoration: none;
            margin-bottom: 15px;
            font-size: 14px;
        }
        .back-btn:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div id="chart-container">
        <a href="index.html" class="back-btn">← Back to Terminal</a>
        <h2>📊 NIFTY 50 - Candlestick Chart</h2>
        <div class="chart-wrapper">
            <canvas id="chartCanvas"></canvas>
        </div>
    </div>

    <script>
        console.log('🚀 Starting Chart.js...');

        // =============================================
        // 1. GENERATE CANDLESTICK DATA
        // =============================================
        function generateData() {
            const data = [];
            let price = 22400;
            const now = new Date();
            const oneHour = 60 * 60 * 1000;

            for (let i = 59; i >= 0; i--) {
                const change = (Math.random() - 0.48) * 60;
                const open = price;
                const close = price + change;
                const high = Math.max(open, close) + Math.random() * 20;
                const low = Math.min(open, close) - Math.random() * 20;

                data.push({
                    time: new Date(now.getTime() - i * oneHour),
                    open: Math.round(open * 100) / 100,
                    high: Math.round(high * 100) / 100,
                    low: Math.round(low * 100) / 100,
                    close: Math.round(close * 100) / 100,
                });

                price = close;
            }

            return data;
        }

        const candleData = generateData();
        console.log('📊 Generated', candleData.length, 'candles');

        // =============================================
        // 2. DRAW CANDLESTICKS USING CHART.JS
        // =============================================
        const ctx = document.getElementById('chartCanvas').getContext('2d');

        // Prepare data for chart
        const labels = candleData.map(d => d.time.toLocaleTimeString());

        // Calculate body ranges
        const bodyData = candleData.map(d => {
            const bodyHigh = Math.max(d.open, d.close);
            const bodyLow = Math.min(d.open, d.close);
            return {
                high: d.high,
                low: d.low,
                open: d.open,
                close: d.close,
                bodyHigh: bodyHigh,
                bodyLow: bodyLow,
                isBull: d.close > d.open,
                // For bar chart we need positive values
                bodyRange: Math.abs(d.close - d.open),
                // Wick ranges
                upperWick: d.high - bodyHigh,
                lowerWick: bodyLow - d.low,
            };
        });

        // Create the chart
        const chart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [
                    // Bullish candles (green)
                    {
                        label: 'Bullish',
                        data: bodyData.map(d => d.isBull ? d.bodyRange : 0),
                        backgroundColor: '#22c55e',
                        borderColor: '#22c55e',
                        borderWidth: 1,
                        barPercentage: 0.6,
                        categoryPercentage: 0.8,
                    },
                    // Bearish candles (red)
                    {
                        label: 'Bearish',
                        data: bodyData.map(d => d.isBull ? 0 : d.bodyRange),
                        backgroundColor: '#ef4444',
                        borderColor: '#ef4444',
                        borderWidth: 1,
                        barPercentage: 0.6,
                        categoryPercentage: 0.8,
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        labels: {
                            color: '#8a9bb5',
                            font: { size: 12 }
                        }
                    },
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                const index = context.dataIndex;
                                const d = candleData[index];
                                return [
                                    `Open: ₹${d.open.toFixed(2)}`,
                                    `High: ₹${d.high.toFixed(2)}`,
                                    `Low: ₹${d.low.toFixed(2)}`,
                                    `Close: ₹${d.close.toFixed(2)}`
                                ];
                            }
                        }
                    }
                },
                scales: {
                    x: {
                        grid: { color: '#1a2433' },
                        ticks: { color: '#5a6f8a', maxTicksLimit: 15 },
                        stacked: false,
                    },
                    y: {
                        grid: { color: '#1a2433' },
                        ticks: { color: '#5a6f8a' },
                        beginAtZero: false,
                    }
                }
            }
        });

        // =============================================
        // 3. DRAW WICKS (High-Low lines)
        // =============================================
        function drawWicks() {
            const canvas = document.getElementById('chartCanvas');
            const ctx2 = canvas.getContext('2d');
            const chartArea = chart.chartArea;
            const yScale = chart.scales.y;

            if (!chartArea) return;

            // Clear previous wick drawings (we keep the bars)
            // We'll draw over the bars

            // Draw wicks for each candle
            candleData.forEach((d, i) => {
                const x = chart.scales.x.getPixelForValue(i);
                const yHigh = yScale.getPixelForValue(d.high);
                const yLow = yScale.getPixelForValue(d.low);
                const yOpen = yScale.getPixelForValue(d.open);
                const yClose = yScale.getPixelForValue(d.close);

                const isBull = d.close > d.open;
                const color = isBull ? '#22c55e' : '#ef4444';

                // Draw wick (line from high to low)
                ctx2.beginPath();
                ctx2.moveTo(x, yHigh);
                ctx2.lineTo(x, yLow);
                ctx2.strokeStyle = color;
                ctx2.lineWidth = 1.5;
                ctx2.stroke();

                // Draw body border
                const bodyTop = Math.min(yOpen, yClose);
                const bodyBottom = Math.max(yOpen, yClose);
                const barWidth = (chart.scales.x.getPixelForValue(1) - chart.scales.x.getPixelForValue(0)) * 0.6;

                ctx2.strokeStyle = color;
                ctx2.lineWidth = 0.5;
                ctx2.strokeRect(x - barWidth / 2, bodyTop, barWidth, bodyBottom - bodyTop);
            });
        }

        // Wait for chart to render then draw wicks
        setTimeout(() => {
            drawWicks();
            console.log('✅ Wicks drawn!');
        }, 500);

        // Redraw wicks on resize
        window.addEventListener('resize', function() {
            setTimeout(drawWicks, 300);
        });

        console.log('✅ Chart created successfully!');
        console.log('📊 KJs TRD Trading Terminal');
    </script>

</body>
</html>
