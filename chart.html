<!DOCTYPE html>
<html>
<head>
    <title>KJs TRD - Chart</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0b0e14;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
        }
        #chart-container {
            background: #0f1620;
            border-radius: 12px;
            padding: 30px;
            width: 95%;
            max-width: 1100px;
            border: 1px solid #2a3a4e;
            height: 600px;
        }
        .back-btn {
            display: inline-block;
            color: #3b82f6;
            text-decoration: none;
            font-size: 14px;
            margin-bottom: 10px;
        }
        .back-btn:hover {
            text-decoration: underline;
        }
        canvas {
            width: 100% !important;
            height: 90% !important;
            display: block;
            cursor: grab;
        }
        canvas:active {
            cursor: grabbing;
        }
        #info {
            color: #5a6f8a;
            font-size: 12px;
            margin-top: 8px;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>

    <div id="chart-container">
        <a href="index.html" class="back-btn">← Back to Terminal</a>
        <canvas id="chartCanvas"></canvas>
        <div id="info">
            <span>📊 Candlestick Chart</span>
            <span>🖱️ Drag to pan | Scroll to zoom</span>
        </div>
    </div>

    <script>
        // ============================================================
        // CANDLESTICK CHART - Pure JavaScript, NO external libraries
        // ============================================================

        const canvas = document.getElementById('chartCanvas');
        const ctx = canvas.getContext('2d');

        // Chart state
        let chartData = [];
        let viewOffset = 0;
        let zoomLevel = 1;
        let isDragging = false;
        let dragStartX = 0;
        let dragStartOffset = 0;

        // ============================================================
        // 1. GENERATE DATA
        // ============================================================
        function generateData(count = 100) {
            const data = [];
            let price = 22400;
            const now = new Date();
            const oneHour = 60 * 60 * 1000;

            for (let i = count - 1; i >= 0; i--) {
                const change = (Math.random() - 0.48) * 60;
                const open = price;
                const close = price + change;
                const high = Math.max(open, close) + Math.random() * 20;
                const low = Math.min(open, close) - Math.random() * 20;

                data.push({
                    time: new Date(now.getTime() - i * oneHour),
                    open: Math.round(open * 100) / 100,
                    high: Math.round(high * 100) / 100,
                    low: Math.round(low * 100) / 100,
                    close: Math.round(close * 100) / 100,
                });

                price = close;
            }

            return data;
        }

        // ============================================================
        // 2. DRAW THE CHART
        // ============================================================
        function drawChart() {
            const rect = canvas.parentElement.getBoundingClientRect();
            const w = rect.width - 4;
            const h = rect.height - 60;
            canvas.width = w;
            canvas.height = h;

            const padding = { top: 30, bottom: 30, left: 70, right: 20 };
            const chartW = w - padding.left - padding.right;
            const chartH = h - padding.top - padding.bottom;

            // Clear
            ctx.fillStyle = '#0f1620';
            ctx.fillRect(0, 0, w, h);

            if (chartData.length === 0) return;

            // Calculate visible range
            const totalCandles = chartData.length;
            const visibleCount = Math.floor(totalCandles / zoomLevel);
            const start = Math.max(0, Math.floor(viewOffset));
            const end = Math.min(totalCandles, start + visibleCount);
            const visibleData = chartData.slice(start, end);

            if (visibleData.length === 0) return;

            // Find min/max
            let minPrice = Infinity;
            let maxPrice = -Infinity;
            visibleData.forEach(d => {
                if (d.high > maxPrice) maxPrice = d.high;
                if (d.low < minPrice) minPrice = d.low;
            });
            const range = maxPrice - minPrice || 1;

            // Draw grid
            ctx.strokeStyle = '#1a2433';
            ctx.lineWidth = 0.5;
            for (let i = 0; i < 5; i++) {
                const y = padding.top + chartH - (chartH * i / 4);
                ctx.beginPath();
                ctx.moveTo(padding.left, y);
                ctx.lineTo(w - padding.right, y);
                ctx.stroke();
                const label = (minPrice + (range * i / 4)).toFixed(0);
                ctx.fillStyle = '#5a6f8a';
                ctx.font = '10px Arial';
                ctx.textAlign = 'right';
                ctx.fillText(label, padding.left - 8, y + 3);
            }

            // Calculate candle sizes
            const candleWidth = chartW / visibleData.length * 0.7;
            const gap = chartW / visibleData.length * 0.3;

            // Draw candles
            visibleData.forEach((d, i) => {
                const x = padding.left + i * (candleWidth + gap);
                const yHigh = padding.top + chartH - (chartH * (d.high - minPrice) / range);
                const yLow = padding.top + chartH - (chartH * (d.low - minPrice) / range);
                const yOpen = padding.top + chartH - (chartH * (d.open - minPrice) / range);
                const yClose = padding.top + chartH - (chartH * (d.close - minPrice) / range);

                const isBull = d.close > d.open;
                const color = isBull ? '#22c55e' : '#ef4444';

                // Wick
                ctx.strokeStyle = color;
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(x + candleWidth / 2, yHigh);
                ctx.lineTo(x + candleWidth / 2, yLow);
                ctx.stroke();

                // Body
                const bodyTop = Math.min(yOpen, yClose);
                const bodyHeight = Math.max(Math.abs(yClose - yOpen), 2);
                ctx.fillStyle = color;
                ctx.fillRect(x, bodyTop, candleWidth, bodyHeight);
            });

            // Draw EMA
            ctx.strokeStyle = '#3b82f6';
            ctx.lineWidth = 2;
            ctx.beginPath();
            let first = true;
            for (let i = 20; i < visibleData.length; i++) {
                let sum = 0;
                for (let j = i - 20; j <= i; j++) {
                    sum += visibleData[j].close;
                }
                const ma = sum / 20;
                const x = padding.left + i * (candleWidth + gap) + candleWidth / 2;
                const y = padding.top + chartH - (chartH * (ma - minPrice) / range);
                if (first) {
                    ctx.moveTo(x, y);
                    first = false;
                } else {
                    ctx.lineTo(x, y);
                }
            }
            ctx.stroke();

            // Buy/Sell markers
            const markerIndices = [10, 28, 45, 62, 78];
            markerIndices.forEach(idx => {
                if (idx < visibleData.length) {
                    const d = visibleData[idx];
                    const x = padding.left + idx * (candleWidth + gap) + candleWidth / 2;
                    const y = padding.top + chartH - (chartH * (d.close - minPrice) / range);
                    const isBuy = idx % 2 === 0;

                    ctx.fillStyle = isBuy ? '#22c55e' : '#ef4444';
                    ctx.beginPath();
                    ctx.moveTo(x, isBuy ? y - 14 : y + 14);
                    ctx.lineTo(x - 7, isBuy ? y - 4 : y + 4);
                    ctx.lineTo(x + 7, isBuy ? y - 4 : y + 4);
                    ctx.closePath();
                    ctx.fill();

                    ctx.fillStyle = '#e8edf5';
                    ctx.font = '8px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText(isBuy ? 'BUY' : 'SELL', x, isBuy ? y - 18 : y + 26);
                }
            });

            // Update info
            if (visibleData.length > 0) {
                const last = visibleData[visibleData.length - 1];
                const first = visibleData[0];
                const change = last.close - first.open;
                const changePercent = (change / first.open) * 100;
                const infoEl = document.getElementById('info');
                const lastPriceEl = document.createElement('span');
                lastPriceEl.textContent = `💰 ₹${last.close.toFixed(2)} ${change >= 0 ? '▲' : '▼'} ${change >= 0 ? '+' : ''}${change.toFixed(2)} (${changePercent.toFixed(2)}%)`;
                infoEl.innerHTML = `<span>📊 ${visibleData.length} candles</span><span>${lastPriceEl.textContent}</span>`;
            }
        }

        // ============================================================
        // 3. MOUSE INTERACTIONS (Pan & Zoom)
        // ============================================================
        canvas.addEventListener('mousedown', (e) => {
            isDragging = true;
            dragStartX = e.clientX;
            dragStartOffset = viewOffset;
            canvas.style.cursor = 'grabbing';
        });

        window.addEventListener('mousemove', (e) => {
            if (isDragging) {
                const deltaX = (e.clientX - dragStartX) / 5;
                viewOffset = Math.max(0, dragStartOffset - deltaX);
                drawChart();
            }
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
            canvas.style.cursor = 'grab';
        });

        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            const zoomFactor = 0.9;
            if (e.deltaY < 0) {
                zoomLevel = Math.min(zoomLevel * 1.2, 5);
            } else {
                zoomLevel = Math.max(zoomLevel * 0.8, 0.5);
            }
            drawChart();
        }, { passive: false });

        // ============================================================
        // 4. RESIZE HANDLER
        // ============================================================
        let resizeTimeout;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(drawChart, 300);
        });

        // ============================================================
        // 5. INITIALIZE
        // ============================================================
        chartData = generateData(100);
        drawChart();

        console.log('✅ Chart loaded successfully!');
        console.log('📊 No external libraries needed!');
        console.log('🖱️ Drag to pan | Scroll to zoom');
    </script>

</body>
</html>
