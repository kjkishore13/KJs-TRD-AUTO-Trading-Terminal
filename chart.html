<!DOCTYPE html>
<html>
<head>
    <title>Chart</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js">
    </script>
    <style>
        body {
            background: #0b0e14;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #chart-container {
            background: #0f1620;
            border-radius: 12px;
            padding: 20px;
            width: 90%;
            max-width: 1000px;
            border: 1px solid #2a3a4e;
        }
        canvas {
            width: 100% !important;
            height: 500px !important;
        }
        h2 {
            color: #e8edf5;
            text-align: center;
            font-family: Arial, sans-serif;
        }
    </style>
</head>
<body>
    <div id="chart-container">
        <h2>📊 NIFTY 50 - Candlestick Chart</h2>
        <canvas id="chartCanvas"></canvas>
    </div>

    <script>
        console.log('🚀 Starting Chart.js...');

        // Generate candlestick data
        const data = [];
        let price = 22400;
        const now = new Date();

        for (let i = 0; i < 60; i++) {
            const change = (Math.random() - 0.48) * 60;
            const open = price;
            const close = price + change;
            const high = Math.max(open, close) + Math.random() * 20;
            const low = Math.min(open, close) - Math.random() * 20;

            data.push({
                x: new Date(now.getTime() - (59 - i) * 60000),
                o: Math.round(open * 100) / 100,
                h: Math.round(high * 100) / 100,
                l: Math.round(low * 100) / 100,
                c: Math.round(close * 100) / 100,
                isBull: close > open
            });

            price = close;
        }

        const ctx = document.getElementById('chartCanvas').getContext('2d');

        // Create candlestick chart using bar chart
        const chart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: data.map(d => d.x.toLocaleTimeString()),
                datasets: [
                    {
                        label: 'Bullish',
                        data: data.map(d => d.isBull ? d.c - d.o : 0),
                        backgroundColor: '#22c55e',
                        borderColor: '#22c55e',
                        borderWidth: 1,
                        barPercentage: 0.6,
                    },
                    {
                        label: 'Bearish',
                        data: data.map(d => d.isBull ? 0 : d.o - d.c),
                        backgroundColor: '#ef4444',
                        borderColor: '#ef4444',
                        borderWidth: 1,
                        barPercentage: 0.6,
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        labels: {
                            color: '#8a9bb5'
                        }
                    },
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                const index = context.dataIndex;
                                const d = data[index];
                                return `O: ${d.o} | H: ${d.h} | L: ${d.l} | C: ${d.c}`;
                            }
                        }
                    }
                },
                scales: {
                    x: {
                        grid: { color: '#1a2433' },
                        ticks: { color: '#5a6f8a', maxTicksLimit: 20 }
                    },
                    y: {
                        grid: { color: '#1a2433' },
                        ticks: { color: '#5a6f8a' }
                    }
                }
            }
        });

        console.log('✅ Chart.js chart created!');
        console.log('📊 Total candles:', data.length);
    </script>
</body>
</html>
